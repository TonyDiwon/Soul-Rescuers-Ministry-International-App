<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Rescuers Ministry</title>
    <style>
        body{font-family:Arial;background:#f0f2f5;padding-bottom:70px;margin:0}
        .header{background:#8B4513;color:white;padding:20px;text-align:center}
        .header img{height:50px}
        .nav{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:10px}
        .nav button{background:none;border:none;font-size:12px;padding:8px;cursor:pointer}
        .nav .active{color:#D2691E;background:#fff0e6;border-radius:20px}
        .content{padding:20px;max-width:600px;margin:0 auto}
        .page{display:none}
        .page.active{display:block}
        .card{background:white;border-radius:20px;padding:20px;margin-bottom:16px}
        .gradient{background:linear-gradient(135deg,#8B4513,#D2691E);color:white;border-radius:20px;padding:24px}
        button{background:#D2691E;color:white;border:none;padding:12px;border-radius:30px;width:100%;margin-top:10px;cursor:pointer}
        select,textarea{width:100%;padding:12px;border-radius:30px;border:1px solid #ccc;margin-bottom:10px}
        .bible-text{background:#f8f9fa;padding:16px;border-radius:12px;line-height:1.8;max-height:400px;overflow-y:auto}
        .sermon-item{background:white;border-radius:20px;padding:16px;margin-bottom:12px;cursor:pointer;display:flex;gap:15px;align-items:center}
        .sermon-icon{width:50px;height:50px;background:#D2691E;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:25px}
        .share{background:#25D366;padding:10px;border-radius:30px;text-align:center;margin-top:10px;cursor:pointer}
    </style>
</head>
<body>
    <div class="header">
        <img src="Weixin_Image_20260326124503_1041_69-removebg-preview.png" alt="Logo">
        <h1>Soul Rescuers Ministry International</h1>
        <p>Faith Forward • Daily Devotion & Bible Study</p>
    </div>

    <div class="content">
        <div id="homePage" class="page active">
            <div class="card">
                <h3>✨ What's on your mind?</h3>
                <textarea id="searchInput" rows="2" placeholder="Type faith, love, prayer, peace..."></textarea>
                <button onclick="searchTopic()">Get Answer</button>
            </div>
            <div id="answerArea" class="card" style="display:none"></div>
            <div id="historyArea"></div>
        </div>

        <div id="devotionalPage" class="page">
            <div id="devotionalContent"></div>
            <div style="display:flex;gap:10px;margin-top:10px">
                <button id="prevBtn" style="background:#ccc;color:#333">← Previous</button>
                <button id="nextBtn">Next →</button>
            </div>
            <div class="share" onclick="shareDevotional()">📱 Share Devotional</div>
        </div>

        <div id="biblePage" class="page">
            <h2>📖 Holy Bible</h2>
            <div class="card">
                <div style="display:flex;gap:10px;margin-bottom:10px">
                    <button id="otBtn" onclick="loadTestament('ot')" style="margin-top:0">Old Testament</button>
                    <button id="ntBtn" onclick="loadTestament('nt')" style="margin-top:0">New Testament</button>
                </div>
                <select id="bookSelect"></select>
                <select id="chapterSelect"></select>
                <div id="bibleText" class="bible-text">Select a book and chapter</div>
                <div class="share" onclick="shareBible()">📱 Share Chapter</div>
            </div>
        </div>

        <div id="sermonsPage" class="page">
            <h2>🎧 Sermons</h2>
            <div id="sermonsList"></div>
        </div>
    </div>

    <div class="nav">
        <button id="navHome" class="active" onclick="showPage('home')">✨ Home</button>
        <button id="navDev" onclick="showPage('devotional')">📖 Devotional</button>
        <button id="navBible" onclick="showPage('bible')">📚 Bible</button>
        <button id="navSermons" onclick="showPage('sermons')">🎧 Sermons</button>
    </div>

    <script>
        const oldBooks = ["Genesis","Exodus","Leviticus","Numbers","Deuteronomy","Joshua","Judges","Ruth","1 Samuel","2 Samuel","1 Kings","2 Kings","1 Chronicles","2 Chronicles","Ezra","Nehemiah","Esther","Job","Psalms","Proverbs","Ecclesiastes","Song of Solomon","Isaiah","Jeremiah","Lamentations","Ezekiel","Daniel","Hosea","Joel","Amos","Obadiah","Jonah","Micah","Nahum","Habakkuk","Zephaniah","Haggai","Zechariah","Malachi"];
        const newBooks = ["Matthew","Mark","Luke","John","Acts","Romans","1 Corinthians","2 Corinthians","Galatians","Ephesians","Philippians","Colossians","1 Thessalonians","2 Thessalonians","1 Timothy","2 Timothy","Titus","Philemon","Hebrews","James","1 Peter","2 Peter","1 John","2 John","3 John","Jude","Revelation"];
        const chapters = {Genesis:50,Exodus:40,Leviticus:27,Numbers:36,Deuteronomy:34,Joshua:24,Judges:21,Ruth:4,"1 Samuel":31,"2 Samuel":24,"1 Kings":22,"2 Kings":25,"1 Chronicles":29,"2 Chronicles":36,Ezra:10,Nehemiah:13,Esther:10,Job:42,Psalms:150,Proverbs:31,Ecclesiastes:12,"Song of Solomon":8,Isaiah:66,Jeremiah:52,Lamentations:5,Ezekiel:48,Daniel:12,Hosea:14,Joel:3,Amos:9,Obadiah:1,Jonah:4,Micah:7,Nahum:3,Habakkuk:3,Zephaniah:3,Haggai:2,Zechariah:14,Malachi:4,Matthew:28,Mark:16,Luke:24,John:21,Acts:28,Romans:16,"1 Corinthians":16,"2 Corinthians":13,Galatians:6,Ephesians:6,Philippians:4,Colossians:4,"1 Thessalonians":5,"2 Thessalonians":3,"1 Timothy":6,"2 Timothy":4,Titus:3,Philemon:1,Hebrews:13,James:5,"1 Peter":5,"2 Peter":3,"1 John":5,"2 John":1,"3 John":1,Jude:1,Revelation:22};

        let currentTestament = 'ot';
        let currentDev = 0;
        let searchHistory = [];

        const devotionals = [
            {title:"Walking by Faith", verse:"2 Cor 5:7", text:"We live by faith, not by sight", explanation:"Faith is trusting God completely. Abraham left his homeland. Moses stood at the Red Sea. Peter walked on water. Faith is choosing to keep our eyes on Jesus.", prayer:"Lord, increase my faith. Amen."},
            {title:"Peace of God", verse:"John 14:27", text:"My peace I give you", explanation:"God's peace is not dependent on circumstances. It is the presence of Christ in the midst of storms.", prayer:"Lord, let Your peace guard my heart. Amen."},
            {title:"Love One Another", verse:"1 John 4:7", text:"Love comes from God", explanation:"Love is the essence of God. When we love, we reflect His nature. Love is unconditional and sacrificial.", prayer:"Father, fill me with Your love. Amen."}
        ];

        const sermonsList = [
            {title:"The Power of Prayer", icon:"🙏", text:"Prayer is a lifeline to God. Do not be anxious, but pray about everything. Prayer aligns our hearts with God's will and brings peace."},
            {title:"Walking in Faith", icon:"👣", text:"We live by faith, not by sight. Abraham left his homeland. Moses chose suffering. Peter walked on water. Trust God when the path is unclear."},
            {title:"Faith That Moves Mountains", icon:"⛰️", text:"Faith as small as a mustard seed can move mountains. It's not the size of your faith—it's the object of your faith."},
            {title:"Living with Purpose", icon:"🎯", text:"You are God's handiwork, created for good works. Your life matters. Your purpose is real."}
        ];

        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(page + 'Page').classList.add('active');
            document.querySelectorAll('.nav button').forEach(btn => btn.classList.remove('active'));
            if(page === 'home') document.getElementById('navHome').classList.add('active');
            if(page === 'devotional') document.getElementById('navDev').classList.add('active');
            if(page === 'bible') { document.getElementById('navBible').classList.add('active'); fetchBibleVerse(); }
            if(page === 'sermons') document.getElementById('navSermons').classList.add('active');
        }

        function loadTestament(testament) {
            currentTestament = testament;
            const books = testament === 'ot' ? oldBooks : newBooks;
            const select = document.getElementById('bookSelect');
            select.innerHTML = '';
            books.forEach(b => { let opt = document.createElement('option'); opt.value = b; opt.textContent = b; select.appendChild(opt); });
            updateChapterSelect();
            fetchBibleVerse();
            document.getElementById('otBtn').style.background = testament === 'ot' ? '#D2691E' : '#e9ecef';
            document.getElementById('ntBtn').style.background = testament === 'nt' ? '#D2691E' : '#e9ecef';
            document.getElementById('otBtn').style.color = testament === 'ot' ? 'white' : '#333';
            document.getElementById('ntBtn').style.color = testament === 'nt' ? 'white' : '#333';
        }

        function updateChapterSelect() {
            const book = document.getElementById('bookSelect').value;
            const max = chapters[book] || 50;
            const select = document.getElementById('chapterSelect');
            select.innerHTML = '';
            for(let i=1; i<=max; i++) { let opt = document.createElement('option'); opt.value = i; opt.textContent = `Chapter ${i}`; select.appendChild(opt); }
        }

        async function fetchBibleVerse() {
            const book = document.getElementById('bookSelect').value;
            const chapter = document.getElementById('chapterSelect').value;
            const div = document.getElementById('bibleText');
            div.innerHTML = '<div class="loading">📖 Loading...</div>';
            try {
                const res = await fetch(`https://bible-api.com/${encodeURIComponent(book)}+${chapter}`);
                const data = await res.json();
                if(data.verses && data.verses.length > 0) {
                    let html = `<strong>${book} ${chapter}</strong><br><br>`;
                    data.verses.forEach(v => { html += `<span style="color:#D2691E;font-weight:bold">${v.verse}</span> ${v.text}<br>`; });
                    div.innerHTML = html;
                } else { div.innerHTML = `<strong>${book} ${chapter}</strong><br><br>📖 God's Word is a lamp to my feet.`; }
            } catch(e) { div.innerHTML = `<strong>${book} ${chapter}</strong><br><br>📖 Please check connection.`; }
        }

        function loadDevotional() {
            const d = devotionals[currentDev];
            document.getElementById('devotionalContent').innerHTML = `
                <div class="gradient"><h3>✨ ${d.title}</h3><p>"${d.text}"<br>— ${d.verse}</p></div>
                <div class="card"><p>${d.explanation}</p><div style="background:#fff0e6;padding:16px;border-radius:12px;margin-top:16px"><h3>💭 Reflection</h3><p>${d.reflection || 'Reflect on this today.'}</p><h3>🙏 Prayer</h3><p>${d.prayer}</p></div></div>`;
        }

        function prevDevotional() { currentDev = (currentDev-1+devotionals.length)%devotionals.length; loadDevotional(); }
        function nextDevotional() { currentDev = (currentDev+1)%devotionals.length; loadDevotional(); }

        function loadSermons() {
            const container = document.getElementById('sermonsList');
            container.innerHTML = '';
            sermonsList.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'sermon-item';
                div.innerHTML = `<div class="sermon-icon">${s.icon}</div><div><strong>${s.title}</strong><br><small>Click to read</small></div>`;
                div.onclick = () => showSermon(i);
                container.appendChild(div);
            });
        }

        function showSermon(index) {
            const s = sermonsList[index];
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:1000;overflow-y:auto;padding:20px';
            modal.innerHTML = `
                <div style="max-width:600px;margin:20px auto;background:white;border-radius:20px;padding:24px;position:relative">
                    <button onclick="this.closest('div').parentElement.remove()" style="position:absolute;top:16px;right:20px;font-size:24px;background:none;border:none">✕</button>
                    <div style="text-align:center;font-size:60px">${s.icon}</div>
                    <h2 style="text-align:center">${s.title}</h2>
                    <div style="line-height:1.8;margin:15px 0;white-space:pre-line">${s.text}</div>
                    <div class="share" onclick="shareSermon('${s.title}')">📱 Share Sermon</div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function searchTopic() {
            const q = document.getElementById('searchInput').value.trim();
            if(!q) { alert('Enter a topic'); return; }
            let answer = '';
            if(q.includes('faith')) answer = '📖 FAITH\n\nFaith is confidence in what we hope for. Abraham trusted God. Moses believed God. Peter walked on water. Faith is choosing to trust God when you cannot see the outcome. 🙏 Prayer: Lord, increase my faith.';
            else if(q.includes('love')) answer = '📖 LOVE\n\nLove is patient and kind. God is love. When we love, we reflect God\'s nature. Love is unconditional and sacrificial. 🙏 Prayer: Father, fill me with Your love.';
            else if(q.includes('prayer')) answer = '📖 PRAYER\n\nPray without ceasing. Prayer is our direct line to God. Bring everything to Him in prayer. 🙏 Prayer: Lord, teach me to pray.';
            else if(q.includes('peace')) answer = '📖 PEACE\n\nPeace I leave with you. God\'s peace is not dependent on circumstances. It is the presence of Christ in the midst of storms. 🙏 Prayer: Lord, let Your peace guard my heart.';
            else answer = `📖 GOD'S WORD\n\n"Your word is a lamp to my feet." — Psalm 119:105\n\nMeditate on God's Word today. Ask the Holy Spirit for understanding. 🙏 Prayer: Lord, open my eyes to see wonderful things in Your Word.`;
            
            document.getElementById('answerArea').style.display = 'block';
            document.getElementById('answerArea').innerHTML = `<div style="white-space:pre-line">${answer}</div><div class="share" onclick="shareAnswer('${answer.replace(/'/g,"\\'")}')">📱 Share</div>`;
            searchHistory.unshift({q:q, a:answer.substring(0,100)});
            localStorage.setItem('searchHistory', JSON.stringify(searchHistory.slice(-5)));
            displayHistory();
            document.getElementById('searchInput').value = '';
        }

        function displayHistory() {
            const saved = localStorage.getItem('searchHistory');
            if(saved) searchHistory = JSON.parse(saved);
            const div = document.getElementById('historyArea');
            if(searchHistory.length === 0) { div.innerHTML = '<p>Your history will appear here</p>'; return; }
            div.innerHTML = '<h3>📜 History</h3>' + searchHistory.map(h => `<div class="card" style="padding:12px"><strong>❓ ${h.q}</strong><br><small>📖 ${h.a}...</small></div>`).join('');
        }

        function shareDevotional() { const d = devotionals[currentDev]; window.open(`https://wa.me/?text=${encodeURIComponent(`✨ ${d.title}\n\n${d.text}\n\n${d.explanation}\n\n🙏 ${d.prayer}`)}`, '_blank'); }
        function shareBible() { const text = document.getElementById('bibleText').innerText; window.open(`https://wa.me/?text=${encodeURIComponent(`📖 Bible\n\n${text.substring(0,500)}`)}`, '_blank'); }
        function shareSermon(title) { window.open(`https://wa.me/?text=${encodeURIComponent(`🎧 ${title}\n\nShare from Soul Rescuers Ministry`)}`, '_blank'); }
        function shareAnswer(text) { window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank'); }

        document.getElementById('prevBtn').onclick = prevDevotional;
        document.getElementById('nextBtn').onclick = nextDevotional;
        document.getElementById('bookSelect').onchange = () => { updateChapterSelect(); fetchBibleVerse(); };
        document.getElementById('chapterSelect').onchange = fetchBibleVerse;

        loadDevotional();
        loadSermons();
        displayHistory();
        loadTestament('ot');
    </script>
</body>
</html>
